<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HTML Processor</title>
    <style>
        :root {
            --bg: #0b3b54;
            --panel: #ffffff;
            --border: #d7e0e7;
            --text: #22313c;
            --muted: #5f707d;
            --accent: #0c6b9f;
            --accent-soft: #e8f3fa;
            --danger: #c0392b;
            --ok: #2e7d32;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Segoe UI", "Noto Sans", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 500px at 50% -100px, #1f7cb0, transparent 70%),
                linear-gradient(180deg, #0c4f73, var(--bg));
            padding: 24px 16px;
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 30px;
            margin-bottom: 6px;
        }

        .header p {
            opacity: 0.9;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin-bottom: 16px;
        }

        .btn {
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: var(--accent);
            color: #fff;
        }

        .btn.secondary {
            background: #fff;
            color: var(--text);
            border-color: var(--border);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .status {
            min-height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .status.busy::before {
            content: "";
            width: 14px;
            height: 14px;
            margin-right: 8px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 16px;
        }

        .editor {
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            background: #fff;
        }

        .editor-header {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--accent-soft);
            font-weight: 600;
            color: var(--accent);
        }

        textarea {
            width: 100%;
            min-height: 420px;
            border: 0;
            resize: vertical;
            outline: 0;
            padding: 14px;
            line-height: 1.6;
            font-family: "Cascadia Code", "Consolas", monospace;
            font-size: 14px;
        }

        textarea[readonly] {
            background: #f8fbfd;
        }

        .hint {
            color: var(--muted);
            text-align: center;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            background: #24323d;
            color: #fff;
            border-radius: 8px;
            padding: 10px 14px;
            transform: translateY(80px);
            opacity: 0;
            transition: all 180ms ease-out;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: var(--danger);
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }

            textarea {
                min-height: 320px;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <header class="header">
            <h1>HTML snippet generator</h1>
            <p>Преобразование блоков в <code>author-ugc</code> и <code>hl</code></p>
        </header>

        <div class="status" id="status" aria-live="polite"></div>
        <p class="hint">Горячие клавиши: Ctrl+Enter - запустить обработку, Esc - очистить все поля.</p>

        <section class="panel toolbar">
            <button class="btn" id="copyBtn" type="button">Копировать результат</button>
            <button class="btn secondary" id="pasteBtn" type="button">Вставить из буфера</button>
            <button class="btn secondary" id="clearBtn" type="button">Очистить все</button>
        </section>

        <section class="panel grid">
            <article class="editor">
                <div class="editor-header">Входной HTML</div>
                <label for="inputText" class="sr-only">Входной HTML</label>
                <textarea id="inputText" spellcheck="false" placeholder="Вставьте HTML для обработки..."></textarea>
            </article>
            <article class="editor">
                <div class="editor-header">Результат</div>
                <label for="outputText" class="sr-only">Результат</label>
                <textarea id="outputText" spellcheck="false" readonly placeholder="Результат обработки появится здесь..."></textarea>
            </article>
        </section>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script>
        const inputEl = document.getElementById("inputText");
        const outputEl = document.getElementById("outputText");
        const statusEl = document.getElementById("status");
        const copyBtn = document.getElementById("copyBtn");
        const pasteBtn = document.getElementById("pasteBtn");
        const clearBtn = document.getElementById("clearBtn");

        const toastEl = document.getElementById("toast");

        let debounceTimer = null;
        let activeController = null;
        let latestRequestId = 0;
        let latestAppliedId = 0;
        let toastTimer = null;

        function setBusyState(isBusy) {
            statusEl.classList.toggle("busy", isBusy);
            statusEl.textContent = isBusy ? "Обработка..." : "";
        }

        function showToast(message, isError = false) {
            toastEl.textContent = message;
            toastEl.classList.toggle("error", isError);
            toastEl.classList.add("show");

            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toastEl.classList.remove("show");
            }, 2500);
        }

        function scheduleProcessing() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                void processInput();
            }, 300);
        }

        async function processInput() {
            const sourceText = inputEl.value;
            if (!sourceText.trim()) {
                if (activeController) {
                    activeController.abort();
                }
                outputEl.value = "";
                statusEl.textContent = "";
                statusEl.classList.remove("busy");
                return;
            }

            if (activeController) {
                activeController.abort();
            }
            activeController = new AbortController();

            const requestId = ++latestRequestId;
            setBusyState(true);

            try {
                const response = await fetch("/process", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: sourceText }),
                    signal: activeController.signal
                });

                const isJson = response.headers.get("content-type")?.includes("application/json");
                const payload = isJson ? await response.json() : null;

                if (!response.ok || !payload || payload.success !== true) {
                    const errorText = payload?.error || `Server returned ${response.status}`;
                    throw new Error(errorText);
                }

                if (requestId < latestAppliedId) {
                    return;
                }

                latestAppliedId = requestId;
                outputEl.value = payload.result;
            } catch (error) {
                if (error.name === "AbortError") {
                    return;
                }
                showToast(error.message || "Не удалось обработать текст.", true);
            } finally {
                if (requestId === latestRequestId) {
                    setBusyState(false);
                }
            }
        }

        async function copyResult() {
            const value = outputEl.value;
            if (!value.trim()) {
                showToast("Пока нечего копировать.", true);
                return;
            }

            try {
                await navigator.clipboard.writeText(value);
                showToast("Результат скопирован.");
            } catch {
                outputEl.select();
                document.execCommand("copy");
                showToast("Результат скопирован.");
            }
        }

        async function pasteInput() {
            try {
                const text = await navigator.clipboard.readText();
                inputEl.value = text;
                scheduleProcessing();
                showToast("Текст вставлен из буфера.");
            } catch {
                showToast("Не удалось прочитать буфер обмена.", true);
            }
        }

        function clearAll() {
            if (activeController) {
                activeController.abort();
            }
            clearTimeout(debounceTimer);
            inputEl.value = "";
            outputEl.value = "";
            setBusyState(false);
            showToast("Поля очищены.");
        }

        inputEl.addEventListener("input", scheduleProcessing);

        inputEl.addEventListener("keydown", (event) => {
            if (event.ctrlKey && event.key === "Enter") {
                clearTimeout(debounceTimer);
                void processInput();
            }
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                clearAll();
            }
        });

        copyBtn.addEventListener("click", copyResult);
        pasteBtn.addEventListener("click", pasteInput);
        clearBtn.addEventListener("click", clearAll);
    </script>
</body>
</html>
